name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Refresh data every 6 hours so the static site stays current.
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allow manual trigger from Actions tab.

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build static data snapshot
        run: node build.mjs
        timeout-minutes: 5
        env:
          AQICN_TOKEN: ${{ secrets.AQICN_TOKEN }}

      - name: Verify Pages artifact contract
        run: |
          test -s public/index.html
          test -s public/api/dashboard.json
          test -s public/api/build-manifest.json
          test -s public/api/layers/drainage.json
          test -s public/api/layers/transit.json
          test -s public/api/layers/land_use.json
          test -s public/api/layers/flood_risk.json
          test -s public/api/layers/flood_zones.json

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
