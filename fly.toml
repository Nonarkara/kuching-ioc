app = "nonarkara-kuching-ioc-live"
primary_region = "sin"

[env]
  HOST = "0.0.0.0"
  PORT = "3000"
  PAGES_PUBLIC_URL = "https://nonarkara.github.io/kuching-ioc/"
  LIVE_IOC_URL = "https://nonarkara-kuching-ioc-live.fly.dev/"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
