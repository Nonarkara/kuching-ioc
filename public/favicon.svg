<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="KCH-IOC">
  <rect width="64" height="64" fill="#010203"/>
  <!-- outer reticle ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#00f3ff" stroke-width="1.5" opacity="0.85"/>
  <!-- inner ring -->
  <circle cx="32" cy="32" r="12" fill="none" stroke="#00f3ff" stroke-width="1" opacity="0.55"/>
  <!-- crosshair -->
  <line x1="32" y1="4"  x2="32" y2="14" stroke="#00f3ff" stroke-width="1.5"/>
  <line x1="32" y1="50" x2="32" y2="60" stroke="#00f3ff" stroke-width="1.5"/>
  <line x1="4"  y1="32" x2="14" y2="32" stroke="#00f3ff" stroke-width="1.5"/>
  <line x1="50" y1="32" x2="60" y2="32" stroke="#00f3ff" stroke-width="1.5"/>
  <!-- centre marker -->
  <circle cx="32" cy="32" r="3" fill="#00f3ff"/>
  <!-- sweep arc -->
  <path d="M 32 32 L 32 10 A 22 22 0 0 1 51 22 Z" fill="#00f3ff" opacity="0.18"/>
  <!-- corner ticks -->
  <line x1="6"  y1="6"  x2="11" y2="6"  stroke="#00f3ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="6"  y1="6"  x2="6"  y2="11" stroke="#00f3ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="58" y1="6"  x2="53" y2="6"  stroke="#00f3ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="58" y1="6"  x2="58" y2="11" stroke="#00f3ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="6"  y1="58" x2="11" y2="58" stroke="#00f3ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="6"  y1="58" x2="6"  y2="53" stroke="#00f3ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="58" y1="58" x2="53" y2="58" stroke="#00f3ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="58" y1="58" x2="58" y2="53" stroke="#00f3ff" stroke-width="1.5" opacity="0.7"/>
</svg>
